<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech Quiz Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title-group">
                <button id="home-btn" class="btn-icon hidden" title="Về sảnh chính">🏠 Sảnh</button>
                <h1 id="app-main-title">Hệ thống Trắc nghiệm</h1>
            </div>
            <div class="header-controls hidden" id="header-stats">
                <div id="attempts-display" class="badge">Số lượt làm bài: <span>...</span></div>
                <div id="timer-display" class="timer">Thời gian: <span>00:00</span></div>
            </div>
        </header>

        <!-- SẢNH CHỜ (LOBBY) -->
        <main id="lobby-section" class="section">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--text-main);">Chọn bài thi của bạn</h2>
            <div id="quiz-list-container" class="lobby-grid">
                <!-- Các nút chọn môn sẽ được JS tự động tạo ở đây -->
            </div>
        </main>

        <main id="loading-section" class="section hidden">
            <p style="text-align: center; font-weight: 600;">Đang tải dữ liệu bài thi...</p>
        </main>

        <main id="quiz-section" class="section hidden">
            <form id="quiz-form">
                <div id="questions-container"></div>
                <button type="submit" class="btn btn-primary">Nộp bài</button>
            </form>
        </main>

        <main id="result-section" class="section hidden">
            <div class="result-summary">
                <h2>Kết quả bài làm</h2>
                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">Điểm số</span>
                        <span id="score-display" class="stat-value">0/0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Tỷ lệ chính xác</span>
                        <span id="accuracy-display" class="stat-value">0%</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Thời gian hoàn thành</span>
                        <span id="time-display" class="stat-value">00:00</span>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="retake-btn" class="btn btn-primary" style="flex: 1;">Làm lại bài này</button>
                    <button id="back-lobby-btn" class="btn btn-secondary" style="flex: 1;">Về sảnh chính</button>
                </div>
            </div>
            
            <div class="detailed-review">
                <h3>Đánh giá chi tiết</h3>
                <div id="review-container"></div>
            </div>
        </main>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
